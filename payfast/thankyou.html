

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You – WebConnect SA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #25D366;
    --green-dark: #128C7E;
    --gold: #F5A623;
    --cream: #FDF8F0;
    --charcoal: #1A1A2E;
    --mid: #3A3A5C;
    --white: #FFFFFF;
    --light: #F0EDE8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    overflow: hidden;
  }

  /* ── CONFETTI CANVAS ── */
  #confetti {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ── MAIN WRAPPER ── */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  /* ── ANIMATED CHECKMARK ── */
  .check-wrap {
    width: 100px; height: 100px;
    background: #E8FAF0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 36px;
    position: relative;
    animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  .check-wrap::before {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 3px solid var(--green);
    animation: ringPulse 1.8s ease-out .6s both;
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes ringPulse {
    0%   { transform: scale(.9); opacity: 1; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  .check-svg {
    width: 48px; height: 48px;
  }
  .check-path {
    stroke: var(--green);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: drawCheck .5s ease .5s forwards;
  }
  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }

  /* ── TEXT ── */
  .headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 6vw, 3.2rem);
    line-height: 1.12;
    color: var(--charcoal);
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp .6s ease .7s forwards;
  }
  .headline .accent { color: var(--green); }

  .sub {
    font-size: 1.05rem;
    color: var(--mid);
    max-width: 480px;
    line-height: 1.65;
    font-weight: 300;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp .6s ease .85s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── BUTTONS ── */
  .actions {
    display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 50px;
    opacity: 0;
    animation: fadeUp .6s ease 1s forwards;
  }
  .btn-wa {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--green); color: #fff;
    padding: 15px 30px; border-radius: 50px;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: .95rem; text-decoration: none;
    box-shadow: 0 6px 24px rgba(37,211,102,.35);
    transition: all .25s;
  }
  .btn-wa:hover { background: var(--green-dark); transform: translateY(-2px); box-shadow: 0 10px 32px rgba(37,211,102,.45); }
  .btn-home {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; color: var(--charcoal);
    padding: 14px 26px; border-radius: 50px;
    font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: .95rem; text-decoration: none;
    border: 2px solid var(--charcoal);
    transition: all .25s;
  }
  .btn-home:hover { background: var(--charcoal); color: #fff; }

  /* ── REDIRECT TIMER ── */
  .redirect-wrap {
    opacity: 0;
    animation: fadeUp .6s ease 1.2s forwards;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .timer-ring {
    position: relative;
    width: 60px; height: 60px;
  }
  .timer-ring svg {
    transform: rotate(-90deg);
    width: 60px; height: 60px;
  }
  .ring-bg {
    fill: none; stroke: var(--light);
    stroke-width: 4;
  }
  .ring-fill {
    fill: none; stroke: var(--green);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 157;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset .9s linear;
  }
  .timer-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 1.15rem; color: var(--charcoal);
  }
  .redirect-label {
    font-size: .82rem; color: var(--mid); font-weight: 400;
    letter-spacing: .03em;
  }

  /* ── FLOATING DOTS BACKGROUND ── */
  .dots {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .dot {
    position: absolute; border-radius: 50%;
    background: rgba(37,211,102,.12);
    animation: floatDot linear infinite;
  }
  @keyframes floatDot {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: .6; }
    100% { transform: translateY(-20vh) scale(1); opacity: 0; }
  }

  /* ── LOGO ── */
  .logo-top {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
    color: var(--charcoal); text-decoration: none; z-index: 10;
  }
  .logo-top span { color: var(--green); }
</style>
</head>
<body>

<!-- Animated BG dots -->
<div class="dots" id="dots"></div>

<!-- Confetti canvas -->
<canvas id="confetti"></canvas>

<!-- Logo -->
<a href="http://webconnectsa.1biz.online/" class="logo-top">Web<span>Connect</span> SA</a>

<main class="page">

  <!-- Checkmark -->
  <div class="check-wrap">
    <svg class="check-svg" viewBox="0 0 48 48">
      <polyline class="check-path" points="10,26 20,36 38,14"/>
    </svg>
  </div>

  <!-- Headline -->
  <h1 class="headline">You're All Set,<br><span class="accent">Thank You! 🎉</span></h1>

  <p class="sub">
    Your order has been received. Our team will reach out via WhatsApp within minutes to confirm everything and get your site live in 3 days.
  </p>

  <!-- Action buttons -->
  <div class="actions">
    <a
      href="https://wa.me/27689124033?text=Please%20confirm%20my%20order%20immediately!%20Thank%20you"
      class="btn-wa"
      target="_blank"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.088.534 4.05 1.472 5.768L.057 23.007a.75.75 0 0 0 .935.935l5.239-1.415A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.887 0-3.66-.498-5.19-1.37l-.372-.218-3.853 1.04 1.041-3.793-.234-.384A9.96 9.96 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
      </svg>
      Confirm on WhatsApp
    </a>
    <a href="http://webconnectsa.1biz.online/" class="btn-home">
      ← Back to Home
    </a>
  </div>

  <!-- Countdown ring -->
  <div class="redirect-wrap">
    <div class="timer-ring">
      <svg viewBox="0 0 60 60">
        <circle class="ring-bg" cx="30" cy="30" r="25"/>
        <circle class="ring-fill" id="ring" cx="30" cy="30" r="25"/>
      </svg>
      <div class="timer-num" id="countdown">5</div>
    </div>
    <p class="redirect-label">Redirecting to home page…</p>
  </div>

</main>

<script>
  /* ── FLOATING DOTS ── */
  const dotsEl = document.getElementById('dots');
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    const size = 8 + Math.random() * 24;
    d.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${6 + Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
    `;
    dotsEl.appendChild(d);
  }

  /* ── CONFETTI ── */
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const COLORS = ['#25D366','#128C7E','#F5A623','#FF6B6B','#6C63FF','#FFF'];
  const pieces = Array.from({length: 140}, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * 200,
    r: 4 + Math.random() * 6,
    d: 0.8 + Math.random() * 2,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    tilt: Math.random() * 10 - 5,
    tiltVel: 0.15 + Math.random() * 0.2,
    tiltAngle: 0,
    shape: Math.random() > .5 ? 'rect' : 'circle',
  }));

  let confettiRunning = true;
  function drawConfetti() {
    if (!confettiRunning) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.tiltAngle * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
      p.y += p.d + 0.5;
      p.x += Math.sin(p.tiltAngle * .017) * 1.2;
      p.tiltAngle += p.tiltVel;
    });
    requestAnimationFrame(drawConfetti);
  }
  setTimeout(() => drawConfetti(), 300);
  setTimeout(() => { confettiRunning = false; ctx.clearRect(0,0,canvas.width,canvas.height); }, 4000);

  /* ── COUNTDOWN & REDIRECT ── */
  const ring = document.getElementById('ring');
  const countEl = document.getElementById('countdown');
  const CIRCUMFERENCE = 157;
  let seconds = 5;

  function tick() {
    seconds--;
    countEl.textContent = seconds;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (seconds / 5);
    if (seconds <= 0) {
      window.location.href = 'http://webconnectsa.1biz.online/';
    } else {
      setTimeout(tick, 1000);
    }
  }

  ring.style.strokeDashoffset = 0;
  setTimeout(tick, 1000);
</script>
</body>
</html>
